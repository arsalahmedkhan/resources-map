<!DOCTYPE html>
<html>
<head>
    <title>Detroit Resource Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; }
        #map { height: 500px; width: 100%; }
        .nav { padding: 10px; background: #222; color: white; display: flex; gap: 10px; overflow-x: auto; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 20px; border: none; background: #444; color: white; white-space: nowrap; }
        button:hover { background: #007bff; }
        .popup-link { display: block; margin-top: 5px; color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="filterMap('all')">All</button>
        <button onclick="filterMap('food')">Food</button>
        <button onclick="filterMap('clothes')">Clothes</button>
        <button onclick="filterMap('helplines')">Helplines</button>
        <button onclick="filterMap('activities')">Kids Activities</button>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([42.3314, -83.0458], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var allData = [];
        var markerGroup = L.layerGroup().addTo(map);

        // PASTE YOUR CSV LINK FROM STEP 2 BELOW
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSDQf4C3GrOGMWh4pJ0DabdO7uHx5sFiDOy8DuPSL6kgXmEehhJTl1ipJoLz7TvI6uxVAHBZvTci02d/pub?output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                allData = results.data;
                displayMarkers('all');
            }
        });

        function displayMarkers(category) {
            markerGroup.clearLayers();
            allData.forEach(function(row) {
                // MATCHING YOUR HEADERS EXACTLY
                var orgName = row["Name of Organization"]; // Note the capital 'O'
                var orgCat  = row["Category"]; 
                var orgLat  = parseFloat(row["Latitude"]);
                var orgLng  = parseFloat(row["Longitude"]);
                var addr    = row["Address"];
                var web     = row["Website"];
                var phone   = row["Phone"];
        
                // Only add pin if Latitude and Longitude exist
                if (!isNaN(orgLat) && !isNaN(orgLng)) {
                    
                    // Check if the pin matches the selected filter
                    if (category === 'all' || (orgCat && orgCat.toLowerCase().includes(category.toLowerCase()))) {
                        
                        var popupContent = `
                            <div style="font-family: sans-serif; line-height: 1.5; min-width: 200px;">
                                <strong style="font-size:16px; color:#222;">${orgName}</strong><br>
                                <span style="color:#555; font-size:13px;">${addr}</span><br>
                                
                                <div style="margin-top: 10px;">
                                    ${phone ? `<a href="tel:${phone}" style="display:inline-block; background:#007bff; color:white; padding:6px 12px; border-radius:4px; text-decoration:none; font-size:12px; margin-bottom:5px;">📞 Call ${phone}</a><br>` : ''}
                                    
                                    ${web ? `<a href="${web}" target="_blank" style="display:inline-block; color:#007bff; font-weight:bold; font-size:13px; text-decoration:none; margin-bottom:5px;">🌐 Visit Website</a><br>` : ''}
                                    
                                    <a href="https://www.google.com/maps/dir/?api=1&destination=${orgLat},${orgLng}" target="_blank" style="display:inline-block; color:#28a745; font-weight:bold; font-size:13px; text-decoration:none;">📍 Get Directions</a>
                                </div>
                            </div>
                        `;
        
                        L.marker([orgLat, orgLng]).bindPopup(popupContent).addTo(markerGroup);
                    }
                }
            });
        }

        function filterMap(c) { displayMarkers(c); }
    </script>
</body>
</html>
